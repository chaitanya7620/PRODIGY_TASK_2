<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style2.css">
</head>

<body>

    <div class="game">
        <h1>Tic Tac Toe</h1>
        <p id="status">X's Turn</p>

        <div class="board">
            <div class="cell" onclick="play(0)"></div>
            <div class="cell" onclick="play(1)"></div>
            <div class="cell" onclick="play(2)"></div>
            <div class="cell" onclick="play(3)"></div>
            <div class="cell" onclick="play(4)"></div>
            <div class="cell" onclick="play(5)"></div>
            <div class="cell" onclick="play(6)"></div>
            <div class="cell" onclick="play(7)"></div>
            <div class="cell" onclick="play(8)"></div>
        </div>

        <div class="controls">
            <div class="mode">
                <button onclick="setTwoPlayer()">2 Players</button>
                <button onclick="setComputer()">Vs Computer</button>
            </div>

            <div class="difficulty">
                <button onclick="setLevel('easy')">Easy</button>
                <button onclick="setLevel('medium')">Medium</button>
                <button onclick="setLevel('hard')">Hard</button>
            </div>

            <button class="reset" onclick="reset()">Restart</button>
        </div>
    </div>

    <script src="script2.js"></script>
</body>

</html>
